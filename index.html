<!DOCTYPE html>
<html lang="en" class="loading-intro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a1a" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <title>evenstone</title>
    <style>
      @font-face {
        font-family: "Iowan Old Style";
        font-style: normal;
        font-weight: 400;
        src: url("/bitstream_iowan_old_style_bt.woff2") format("woff2");
        font-display: block;
      }
      :root {
        --bg: #1a1a1a;
        --ink: #3b3a3a;
        --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        --serif: "Iowan Old Style", "Iowan Old Style BT", Georgia, serif;
        --evenstone-cursor-size: 24px;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body,
      *,
      *::before,
      *::after {
        cursor: none !important;
      }
      html {
        background: var(--bg);
      }
      body {
        width: 100%;
        height: 100dvh;
        background: transparent;
        color: var(--ink);
        font-family: var(--serif);
        overflow: hidden;
        user-select: none;
        -webkit-font-smoothing: antialiased;
      }
      .title-card {
        position: fixed;
        inset: 0;
        z-index: 800;
        display: grid;
        place-items: center;
        color: var(--ink);
        background:
          radial-gradient(
            ellipse 75% 65% at center,
            transparent 22%,
            rgba(253, 250, 244, 0.55) 48%,
            rgba(254, 251, 245, 0.95) 82%,
            rgba(254, 251, 245, 1) 100%
          ),
          linear-gradient(
            to bottom,
            rgb(155, 175, 200) 0%,
            rgb(206, 196, 178) 60%,
            rgb(220, 198, 162) 100%
          );
        pointer-events: none;
      }
      .title-card__title {
        grid-area: 1 / 1;
        font-family: var(--serif);
        font-size: clamp(40px, 5.5vw, 68px);
        font-weight: 400;
        letter-spacing: 0.04em;
      }
      .title-card__hint {
        display: none;
        grid-area: 1 / 1;
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: 0;
        color: rgba(59, 58, 58, 0.66);
        opacity: 0;
      }
      @media (hover: hover) and (pointer: fine) {
        .title-card__hint {
          display: block;
        }
      }
      html.loading-intro .about-modal {
        visibility: hidden;
      }
      #cursor-hit-area {
        position: fixed;
        inset: 0;
        z-index: 900;
        background: transparent;
        cursor: none !important;
      }
      #custom-cursor {
        position: fixed;
        left: 0;
        top: 0;
        z-index: 1000;
        width: var(--evenstone-cursor-size);
        height: var(--evenstone-cursor-size);
        border: 1px solid rgba(244, 240, 232, 0.92);
        border-radius: 50%;
        pointer-events: none;
        transform: translate3d(-100px, -100px, 0);
      }
    </style>
    <script>
      if (matchMedia("(hover: hover) and (pointer: fine)").matches) {
        document.documentElement.classList.add("using-custom-cursor");
      }
    </script>
  </head>
  <body>
    <canvas id="halo"></canvas>
    <div class="top-glow"></div>

    <div id="title-card" class="title-card">
      <span class="title-card__title">evenstone</span>
      <p class="title-card__hint">best viewed fullscreen / ctrl shift F</p>
    </div>
    <span id="about" class="link" role="button" tabindex="0">about</span>
    <div id="cursor-hit-area" aria-hidden="true"></div>
    <div id="custom-cursor" aria-hidden="true"></div>

    <main class="layout">
      <div class="stage-stack">
        <figure class="frame">
          <canvas id="stage"></canvas>
        </figure>
        <p id="timestamp" class="caption timestamp" aria-live="polite"></p>
      </div>
    </main>

    <div id="about-modal" class="about-modal" aria-hidden="true" role="dialog">
      <div class="about-modal__content">
        <p>evenstone</p>
        <p>a series of photographs of Diamond Head</p>
        <p>inspired by Monet's Rouen Cathedral series</p>
        <p>taken over the course of a day</p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
