<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a1a" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <title>evenstone</title>
  </head>
  <body>
    <canvas id="halo"></canvas>
    <div class="top-glow"></div>

    <div id="title-card" class="title-card">evenstone</div>

    <button id="about" class="link">about</button>

    <main class="layout">
      <div class="stage-stack">
        <figure class="frame">
          <canvas id="stage"></canvas>
        </figure>
        <p id="timestamp" class="caption timestamp" aria-live="polite"></p>
      </div>
    </main>

    <div id="about-modal" class="about-modal" aria-hidden="true" role="dialog">
      <div class="about-modal__content">
        <p>evenstone</p>
        <p>a series of photographs of Diamond Head</p>
        <p>inspired by Monet's Rouen Cathedral series</p>
        <p>taken over the course of a day</p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
